{% extends "layouts/app.html" %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

<style>
    :root {
        --insta-gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
    }

    .hero-wrapper {
        min-height: 100vh;
        background: radial-gradient(circle at top right, #fff5f6, #ffffff);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 50px;
        overflow-x: hidden;
    }

    .main-title {
        font-size: 4.5rem;
        font-weight: 900;
        background: var(--insta-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -2px;
        margin-bottom: 5px;
    }

    .sub-title {
        color: #262626;
        font-weight: 500;
        font-size: 1.25rem;
        max-width: 600px;
        margin-bottom: 40px;
        line-height: 1.4;
    }

    /* Floating Avatars (FOMO Effect) */
    .floating-users {
        position: relative;
        width: 100%;
        max-width: 800px;
        height: 100px;
    }

    .user-avatar {
        position: absolute;
        border-radius: 50%;
        border: 3px solid white;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

        0%,
        100% {
            transform: translateY(0);
        }

        50% {
            transform: translateY(-10px);
        }
    }

    /* Video/Preview Card with Glassmorphism */
    .preview-window {
        width: 90%;
        max-width: 550px;
        background: white;
        border-radius: 30px;
        padding: 10px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.3);
        position: relative;
        z-index: 2;
    }

    .live-status {
        position: absolute;
        top: 25px;
        left: 25px;
        background: rgba(237, 73, 86, 0.9);
        color: white;
        padding: 6px 15px;
        border-radius: 10px;
        font-size: 0.75rem;
        font-weight: 800;
        letter-spacing: 1px;
        backdrop-filter: blur(5px);
        z-index: 10;
    }

    .preview-img {
        width: 100%;
        border-radius: 22px;
        display: block;
        transition: transform 0.5s ease;
    }

    .preview-window:hover .preview-img {
        transform: scale(1.02);
    }

    /* Magnetic Buttons */
    .auth-box {
        margin-top: -30px;
        padding-top: 60px;
        padding-bottom: 40px;
        width: 100%;
        background: linear-gradient(to bottom, transparent, #ffffff);
        z-index: 3;
    }

    .btn-main {
        background: #0095f6;
        color: white;
        border: none;
        padding: 16px 50px;
        border-radius: 15px;
        font-size: 1.1rem;
        font-weight: 700;
        box-shadow: 0 10px 20px rgba(0, 149, 246, 0.3);
        transition: all 0.3s;
    }

    .btn-main:hover {
        background: #1877f2;
        transform: translateY(-3px);
        box-shadow: 0 15px 25px rgba(0, 149, 246, 0.4);
        color: white;
    }

    .btn-ghost {
        color: #262626;
        font-weight: 700;
        margin-top: 15px;
        text-decoration: none;
        transition: 0.3s;
    }

    .btn-ghost:hover {
        color: #0095f6;
    }

    .counter-text {
        color: #8e8e8e;
        font-size: 0.9rem;
        margin-top: 20px;
    }
</style>

<div class="hero-wrapper">
    <div class="floating-users d-none d-md-block">
        <img src="https://i.pravatar.cc/60?u=1" class="user-avatar" style="top: 10px; left: 10%; width: 50px;">
        <img src="https://i.pravatar.cc/60?u=2" class="user-avatar"
            style="top: 50px; right: 15%; width: 60px; animation-delay: 0.5s;">
        <img src="https://i.pravatar.cc/60?u=3" class="user-avatar"
            style="bottom: 0; left: 30%; width: 45px; animation-delay: 1s;">
    </div>

    <h1 class="main-title animate__animated animate__pulse">Diagram</h1>
    <p class="sub-title">The world is waiting for your story. Join the conversation and meet amazing people instantly.
    </p>

    <div class="preview-window animate__animated animate__fadeInUp">
        <div class="live-status">
            <i class="fas fa-circle me-1" style="font-size: 8px; vertical-align: middle;"></i> LIVE CALL
        </div>
        <img src="/media/posts/Screenshot_2026-03-25_124159.jpg" class="preview-img" alt="Diagram App Preview">
    </div>

    <div class="auth-box text-center">
        <div class="d-flex flex-column align-items-center">
            <a href="{% url 'login' %}" class="btn btn-main">Log In to See Who's Online</a>
            <a href="{% url 'register' %}" class="btn btn-ghost">Don't have an account? Sign Up</a>

            <p class="counter-text">
                <i class="fas fa-bolt text-warning me-1"></i>
                <strong>2,482</strong> creators are live right now
            </p>
        </div>
    </div>
</div>

<script>
    // Thoda sa interactive parallax effect preview image par
    const card = document.querySelector('.preview-window');
    document.addEventListener('mousemove', (e) => {
        let x = (window.innerWidth / 2 - e.pageX) / 30;
        let y = (window.innerHeight / 2 - e.pageY) / 30;
        card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
    });
</script>

{% endblock %}
