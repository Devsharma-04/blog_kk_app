{% extends "layouts/app.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow border-0 p-4" style="border-radius: 20px;">
            <h3 class="text-center mb-4 fw-bold">Add to Your Story</h3>
            
            <form method="POST" enctype="multipart/form-data" id="storyForm">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label fw-bold"><i class="fas fa-image me-2"></i>Select Photo</label>
                    <div class="input-group">
                        {{ form.image }}
                    </div>
                    {% if form.image.errors %}
                        <div class="text-danger small">{{ form.image.errors }}</div>
                    {% endif %}
                </div>

                <div class="mb-4 position-relative">
                    <label class="form-label fw-bold"><i class="fab fa-spotify me-2 text-success"></i>Add Music (Spotify)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
                        <input type="text" id="musicQuery" class="form-control border-start-0" placeholder="Search for a song or artist...">
                    </div>
                    
                    <div id="musicResults" class="list-group mt-1 shadow-lg" style="display: none; position: absolute; width: 100%; z-index: 1000; max-height: 250px; overflow-y: auto; background: white;">
                    </div>
                    
                    <div id="selectedMusicDisplay" class="mt-3 p-2 border rounded d-none align-items-center bg-light">
                        <img id="selTrackImg" src="" width="45" class="rounded me-3 shadow-sm">
                        <div class="flex-grow-1">
                            <h6 id="selTrackName" class="mb-0 small fw-bold text-dark"></h6>
                            <small id="selTrackArtist" class="text-muted" style="font-size: 11px;"></small>
                        </div>
                        <button type="button" class="btn-close btn-sm ms-2" onclick="removeSelectedMusic()"></button>
                    </div>

                    <input type="hidden" name="selected_music_url" id="musicUrlInput">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Caption</label>
                    <input type="text" name="caption" class="form-control" placeholder="Write a caption...">
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm fw-bold">Post Story</button>
                    <a href="{% url 'home' %}" class="btn btn-link text-muted">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const musicInput = document.getElementById('musicQuery');
    const resultsBox = document.getElementById('musicResults');
    const urlInput = document.getElementById('musicUrlInput');
    const displayBox = document.getElementById('selectedMusicDisplay');

    // Real-time Search
    musicInput.addEventListener('input', function() {
        let q = this.value.trim();
        if(q.length > 2) {
            // FIX: Yahan 'fetch' missing tha jiski wajah se '.' error aa rahi thi
            fetch(`/auth/spotify_search/?q=${encodeURIComponent(q)}`)
                .then(res => res.json())
                .then(data => {
                    resultsBox.innerHTML = '';
                    if (data.results && data.results.length > 0) {
                        resultsBox.style.display = 'block';
                        data.results.forEach(track => {
                            const item = document.createElement('button');
                            item.type = 'button';
                            item.className = 'list-group-item list-group-item-action d-flex align-items-center border-0 py-2';
                            item.innerHTML = `
                                <img src="${track.image}" width="40" class="rounded me-3">
                                <div class="text-start">
                                    <div class="small fw-bold text-dark">${track.name}</div>
                                    <div style="font-size: 11px;" class="text-muted">${track.artist}</div>
                                </div>
                            `;
                            item.onclick = () => selectTrack(track);
                            resultsBox.appendChild(item);
                        });
                    } else {
                        resultsBox.style.display = 'none';
                    }
                })
                .catch(err => {
                    console.error("Search Error:", err);
                    resultsBox.style.display = 'none';
                });
        } else {
            resultsBox.style.display = 'none';
        }
    });

    function selectTrack(track) {
        urlInput.value = track.preview_url;
        document.getElementById('selTrackImg').src = track.image;
        document.getElementById('selTrackName').innerText = track.name;
        document.getElementById('selTrackArtist').innerText = track.artist;
        
        displayBox.classList.remove('d-none');
        displayBox.classList.add('d-flex');
        
        resultsBox.style.display = 'none';
        musicInput.value = '';
    }

    function removeSelectedMusic() {
        urlInput.value = '';
        displayBox.classList.add('d-none');
        displayBox.classList.remove('d-flex');
    }

    document.addEventListener('click', function(e) {
        if (!musicInput.contains(e.target) && !resultsBox.contains(e.target)) {
            resultsBox.style.display = 'none';
        }
    });
</script>

<style>
    .list-group-item:hover {
        background-color: #f8f9fa;
    }
    #musicResults {
        border-radius: 10px;
        border: 1px solid #ddd;
    }
</style>
{% endblock %}
