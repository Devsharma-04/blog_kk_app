{% load static %}
{% load pwa %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    {% progressive_web_app_meta %}

    <title>Diagram | Connect</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #ffffff;
            --border-soft: #efefef;
            --text-main: #262626;
            --accent-blue: #0095f6;
            --accent-danger: #ed4956;
        }

        body { 
            background-color: var(--bg-base); 
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
        }

        .navbar { 
            border-bottom: 1px solid var(--border-soft); 
            background-color: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(10px);
            height: 60px;
        }

        .navbar-brand { 
            font-weight: 800; 
            letter-spacing: -1px; 
            font-size: 1.5rem;
            color: #000 !important;
            text-decoration: none;
        }

        .search-container { position: relative; width: 268px; }
        .search-input { 
            background-color: #efefef !important; 
            border-radius: 8px; 
            border: none; 
            padding: 9px 15px 9px 35px; 
            font-size: 14px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e8e;
            font-size: 13px;
        }

        .nav-link { 
            color: var(--text-main) !important; 
            padding: 0 12px !important;
            font-size: 1.3rem;
            transition: transform 0.1s ease;
            position: relative;
        }
        .nav-link:hover { transform: scale(1.1); color: var(--accent-blue) !important; }

        /* Video Icon Special Style */
        .nav-link.video-link { color: var(--accent-danger) !important; }
        .nav-link.video-link:hover { color: #c32aa3 !important; }

        .notification-dot {
            position: absolute;
            top: 0px;
            right: 5px;
            height: 10px;
            width: 10px;
            background-color: #ff3b30;
            border-radius: 50%;
            border: 2px solid white;
        }

        .logout-btn {
            font-weight: 600;
            font-size: 13px;
            color: var(--accent-danger);
            text-decoration: none;
            border: 1px solid var(--accent-danger);
            padding: 4px 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .logout-btn:hover { background: var(--accent-danger); color: #fff; }

        .profile-nav-icon {
            width: 28px; 
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #dbdbdb;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Diagram</a>
    
        {% if user.is_authenticated %}
        <div class="search-container d-none d-md-block mx-auto">
            <i class="fas fa-search search-icon"></i>
            <form action="{% url 'search_users' %}" method="GET">
                <input class="form-control search-input" type="search" name="q" placeholder="Search users..." aria-label="Search">
            </form>
        </div>
        {% endif %}

        <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <i class="fas fa-bars-staggered"></i>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" title="Home" href="{% url 'home' %}"><i class="fas fa-house"></i></a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link video-link" title="Stranger Video Call" href="{% url 'video_call' %}">
                            <i class="fas fa-video"></i>
                        </a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" title="Messages" href="{% url 'inbox' %}">
                            <i class="fa-regular fa-comment-dots"></i>
                            <div id="unread-dot-container"></div>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" title="New Post" href="{% url 'create_post' %}"><i class="fa-regular fa-square-plus"></i></a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" title="Activity" href="{% url 'dashboard' %}"><i class="fa-regular fa-heart"></i></a>
                    </li>

                    <li class="nav-item ms-2">
                        <a class="nav-link p-0" title="Profile" href="{% url 'dashboard' %}">
                            <img src="{% if user.profile.profile_pic %}{{ user.profile.profile_pic.url }}{% else %}https://ui-avatars.com/api/?name={{ user.username }}&background=random{% endif %}" 
                                 class="profile-nav-icon" 
                                 onerror="this.src='https://ui-avatars.com/api/?name={{ user.username }}&background=random'">
                        </a>
                    </li>

                    <li class="nav-item ms-lg-4 mt-3 mt-lg-0">
                        <a class="logout-btn" href="{% url 'logout' %}">Logout</a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link fs-6 fw-bold" href="{% url 'login' %}">Log In</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-primary btn-sm ms-lg-3 px-4 fw-bold" href="{% url 'register' %}" style="border-radius: 8px; background-color: var(--accent-blue);">Sign Up</a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4 mb-5">
    {% block content %}
    {% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function updateNotificationDot() {
        {% if user.is_authenticated %}
        fetch('{% url "check_unread_messages" %}')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('unread-dot-container');
                if (data.has_unread) {
                    if (!container.innerHTML) {
                        container.innerHTML = '<span class="notification-dot"></span>';
                    }
                } else {
                    container.innerHTML = '';
                }
            })
            .catch(err => console.log('Error:', err));
        {% endif %}
    }
    setInterval(updateNotificationDot, 5000);
    updateNotificationDot();
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/serviceworker.js')
                .then(reg => console.log('PWA OK'))
                .catch(err => console.log('PWA Error'));
        });
    }
</script>
</body>
</html>
