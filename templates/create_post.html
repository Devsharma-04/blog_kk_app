{% extends "layouts/app.html" %} {% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-sm" style="border-radius: 12px;">
            <div class="card-header bg-white border-bottom-0 pt-4 text-center">
                <h4 class="fw-bold">Create New Post</h4>
            </div>
            <div class="card-body px-4 pb-4">
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary fw-bold" style="background-color: #0095f6; border: none; border-radius: 8px;">
                            Share Post
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer bg-light text-center py-3" style="border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;">
                <a href="{% url 'home' %}" class="text-decoration-none text-muted small">Discard post</a>
            </div>
        </div>
    </div>
</div>

<style>
    /* Input fields ko sundar banane ke liye */
    input[type="text"], textarea, input[type="file"], select {
        width: 100%;
        padding: 10px;
        border: 1px solid #dbdbdb;
        border-radius: 5px;
        background-color: #fafafa;
        font-size: 14px;
    }
    input:focus, textarea:focus {
        outline: none;
        border-color: #a8a8a8 !important;
        box-shadow: none !important;
    }
</style>
{% endblock %}
